# Pulumi ESC environment for AWS workshop credentials
#
# This environment stores AWS credentials provided by the instructor.
# Credentials are encrypted at rest using fn::secret.
#
# To use this template:
# 1. Get your AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from the instructor's credential page
# 2. Replace the placeholder values below
#
# Create the environment in Pulumi Cloud:
#   1. Navigate to Environments > Create environment
#   2. Set project: aws-bedrock-workshop, environment: dev
#   3. Paste this YAML and replace the placeholders
#   4. Save and verify with: pulumi env open aws-bedrock-workshop/dev

values:
  aws-creds:
    accessKeyId:
      fn::secret: <YOUR_AWS_ACCESS_KEY_ID>
    secretAccessKey:
      fn::secret: <YOUR_AWS_SECRET_ACCESS_KEY>
  environmentVariables:
    AWS_ACCESS_KEY_ID: ${aws-creds.accessKeyId}
    AWS_SECRET_ACCESS_KEY: ${aws-creds.secretAccessKey}
  pulumiConfig:
    aws:region: us-east-1
